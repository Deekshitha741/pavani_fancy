{% extends "base.html" %}
{% block title %}Sign In — Sri Pavani{% endblock %}
{% block content %}
<div class="form-page" data-logged-in="false">
  <div class="form-card">
    <div class="form-logo">
      <a href="{{ url_for('index') }}" class="logo" style="justify-content:center;margin-bottom:0.5rem">
        <span class="logo-icon" style="font-size:2.5rem">✦</span>
      </a>
    </div>
    <h2 class="form-title">Welcome Back</h2>
    <p class="form-sub">Sign in to your Sri Pavani account</p>

    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="form-submit">Sign In ✦</button>
    </form>

    <div class="form-switch">
      New to Sri Pavani? <a href="{{ url_for('register') }}">Create Account</a>
    </div>
  </div>
</div>
{% endblock %}
