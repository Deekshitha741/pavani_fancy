{% extends "base.html" %}
{% block title %}Create Account — Sri Pavani{% endblock %}
{% block content %}
<div class="form-page" data-logged-in="false" style="padding:5rem 2rem 3rem;">
  <div class="form-card" style="max-width:620px">
    <div class="form-logo">
      <a href="{{ url_for('index') }}" class="logo" style="justify-content:center;margin-bottom:0.5rem">
        <span class="logo-icon" style="font-size:2.5rem">✦</span>
      </a>
    </div>
    <h2 class="form-title">Create Your Account</h2>
    <p class="form-sub">Join the Sri Pavani family today</p>

    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" name="name" placeholder="Your full name" required/>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" name="email" placeholder="your@email.com" required/>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="+91 9999999999"/>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" name="dob"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select name="gender">
            <option value="">Select Gender</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" name="password" placeholder="Create a password" required/>
        </div>
        <div class="form-group full-width">
          <label>Address</label>
          <textarea name="address" rows="2" placeholder="Street address, House No..."></textarea>
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" name="city" placeholder="Your city"/>
        </div>
        <div class="form-group">
          <label>State</label>
          <select name="state">
            <option value="">Select State</option>
            <option>Andhra Pradesh</option><option>Telangana</option>
            <option>Tamil Nadu</option><option>Karnataka</option>
            <option>Kerala</option><option>Maharashtra</option>
            <option>Gujarat</option><option>Rajasthan</option>
            <option>Delhi</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Pincode</label>
          <input type="text" name="pincode" placeholder="500001"/>
        </div>
      </div>
      <button type="submit" class="form-submit" style="margin-top:1rem">Create Account ✦</button>
    </form>

    <div class="form-switch">
      Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
